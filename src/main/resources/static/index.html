<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plant AI 🌿</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="index.css" rel="stylesheet">
</head>
<body>

<div class="container py-4">
    <h2 class="text-center mb-4">Plant Identifier AI</h2>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card p-3">
                <h5>Upload Plant Image</h5>

                <input type="file" id="imageInput" class="form-control mb-3">
                <button class="btn btn-success w-100" id="identifyBtn">

                    Identify Plant
                </button>

                <hr>

                <div id="plantResult"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Ask About Plant</h5>

                <div id="chatBox" class="mb-3"></div>

                <div class="input-group">
                    <input type="text" id="questionInput" class="form-control" placeholder="Ask something...">
                    <button class="btn btn-success" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="app.js"></script>
</body>
</html>
